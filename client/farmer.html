<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="./src/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Farmer Dashboard | AgriStack</title>
  <style>
    /* Dashboard-specific styling to keep things neat */
    .dashboard-container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; display: grid; grid-template-columns: 1fr 2fr; gap: 2rem; }
    .form-card, .listings-card { background: var(--bg-white); padding: 2rem; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 4px solid var(--primary-green); }
    .listings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; margin-top: 1rem; }
    .crop-card { border: 1px solid #ddd; padding: 1rem; border-radius: 8px; text-align: left; }
    .crop-card h4 { color: var(--dark-green); margin-bottom: 0.5rem; }
    .crop-badge { display: inline-block; padding: 0.2rem 0.5rem; background: var(--light-green); color: var(--primary-green); border-radius: 4px; font-size: 0.8rem; font-weight: bold; margin-bottom: 0.5rem; }
    
    /* Mobile Responsiveness */
    @media (max-width: 768px) { .dashboard-container { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  
  <nav class="navbar">
    <div class="logo">AgriStack <span style="font-size: 1rem; color: #d1fae5;">| Farmer Portal</span></div>
    <a class="navbar-link" id="logout-btn" href="#" style="margin-left: auto;">Logout</a>
  </nav>

  <main class="dashboard-container">
    <!-- Left Column: Add New Listing Form -->
    <div class="form-card">
      <h3 style="color: var(--primary-green); margin-bottom: 1.5rem;">Post New Crop</h3>
      <form id="addCropForm">
        <div class="input-group">
          <label for="cropName">Crop Name</label>
          <input type="text" id="cropName" placeholder="e.g., Basmati Rice" required>
        </div>
        <div class="input-group">
          <label for="cropDesc">Description & Quality</label>
          <input type="text" id="cropDesc" placeholder="e.g., Grade A, Organic" required>
        </div>
        <div class="input-group radio-grid" style="margin-bottom: 1.5rem;">
          <div>
            <label for="cropQty">Quantity (Tons)</label>
            <input type="number" id="cropQty" min="1" step="0.1" placeholder="0.0" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
          </div>
          <div>
            <label for="minBid">Min. Bid (₹/Ton)</label>
            <input type="number" id="minBid" min="1" placeholder="₹" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
          </div>
        </div>
        <button type="submit" class="modal-login-btn">Publish Listing</button>
      </form>
    </div>

    <!-- Right Column: Active Listings Display -->
    <div class="listings-card">
      <h3 style="color: var(--primary-green);">My Active Listings</h3>
      <div id="listingsContainer" class="listings-grid">
        <!-- Crop cards will be injected here by JavaScript -->
        <p style="color: #888;">Loading your crops...</p>
      </div>
    </div>
  </main>

  <!-- Load the Auth Guard first, then the specific Farmer logic -->
  <script type="module" src="./src/authGuard.js"></script>
  <script type="module" src="./src/farmer.js"></script>
</body>
</html>
